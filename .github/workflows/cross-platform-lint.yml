name: Cross-platform lint

# This workflow catches the cheap, high-value regressions for Linux/macOS
# contributors without needing the Il2Cpp DLLs (which are generated by
# MelonLoader on the user's machine and aren't available in CI).
#
# What it checks:
#   - Backslashes in csproj HintPaths (breaks Linux/macOS builds silently)
#   - CRLF on tracked text files (fights .editorconfig / .gitattributes)
#   - csproj XML is well-formed
#
# What it does NOT do: full `dotnet build`. To validate a build, run it
# locally against your Suzerain install.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No backslashes in csproj HintPaths
        run: |
          if grep -nP 'HintPath>[^<]*\\' SuzerainModdingKit/SuzerainModdingKit.csproj; then
            echo "::error::Backslash found in a HintPath. Linux/macOS builds will silently fail."
            echo "Switch the offending HintPath(s) to forward slashes."
            exit 1
          fi

      - name: No CRLF line endings on tracked text files
        run: |
          # Only check files git considers text; binaries shouldn't be checked.
          mapfile -t files < <(git ls-files \
            ':!:*.png' ':!:*.jpg' ':!:*.jpeg' ':!:*.gif' ':!:*.ico' \
            ':!:*.dll' ':!:*.exe' ':!:*.pdb')
          offenders=()
          for f in "${files[@]}"; do
            if [ -f "$f" ] && file "$f" | grep -q CRLF; then
              offenders+=("$f")
            fi
          done
          if [ ${#offenders[@]} -gt 0 ]; then
            echo "::error::CRLF line endings found on tracked files:"
            printf '  %s\n' "${offenders[@]}"
            echo "Run 'git add --renormalize .' after checking .gitattributes."
            exit 1
          fi

      - name: csproj is well-formed XML
        run: |
          # xmllint ships with libxml2-utils, preinstalled on ubuntu-latest.
          xmllint --noout SuzerainModdingKit/SuzerainModdingKit.csproj
          xmllint --noout Directory.Build.props
